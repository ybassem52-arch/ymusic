<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ymusic - SoundCloud Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0c0c0c; user-select: none; -webkit-tap-highlight-color: transparent; }
        .ymusic-red { background-color: #ff2d2d; }
        .text-ymusic-red { color: #ff2d2d; }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="text-zinc-400 h-screen flex flex-col overflow-hidden">

    <main id="screen-search" class="flex-1 overflow-y-auto px-4 pt-6 pb-36 space-y-5">
        <h1 class="text-4xl font-extrabold text-ymusic-red tracking-tight px-1">ymusic</h1>
        <div class="relative px-1">
            <form id="search-form" onsubmit="performSearch(event)">
                <input type="text" id="search-input" placeholder="ابحث عن سور، أناشيد، أو أغاني في ساوند كلاود..." 
                       class="w-full bg-[#1e1e1e] text-white placeholder-zinc-500 rounded-2xl py-3.5 pl-12 pr-4 focus:outline-none text-base border border-transparent focus:border-zinc-800">
                <button type="submit" class="absolute left-5 top-1/2 -translate-y-1/2 text-zinc-500 text-lg">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </button>
            </form>
        </div>
        <div class="space-y-3 px-1">
            <h2 class="text-lg font-bold text-white tracking-wide">نتائج البحث</h2>
            <div id="trending-list" class="space-y-3">
                <p class="text-zinc-600 text-sm text-center py-10">اكتب اسم ما تريد سماعه واضغط Enter</p>
            </div>
        </div>
    </main>

    <!-- باقي الشاشات (Favorites, Playlists) كما كانت -->
    <main id="screen-favorites" class="flex-1 overflow-y-auto px-4 pt-6 pb-36 space-y-5 hidden">
        <div class="px-1"><h1 class="text-3xl font-bold text-white">Favorites</h1><p id="fav-count" class="text-xs text-zinc-500 mt-1">0 songs</p></div>
        <div id="favorites-list" class="space-y-3 pt-1 px-1"></div>
    </main>

    <main id="screen-playlists" class="flex-1 overflow-y-auto px-4 pt-6 pb-36 space-y-5 hidden">
        <div class="flex justify-between items-center px-1"><h1 class="text-3xl font-bold text-white">Your Playlists</h1><button onclick="createNewPlaylist()" class="text-ymusic-red text-2xl"><i class="fa-solid fa-plus-circle"></i></button></div>
        <div id="playlists-list" class="grid grid-cols-2 gap-3 px-1"></div>
    </main>

    <main id="screen-playlist-view" class="flex-1 overflow-y-auto px-4 pt-6 pb-36 space-y-5 hidden">
        <div class="flex items-center space-x-3 px-1"><button onclick="switchScreen('playlists')" class="text-white text-lg"><i class="fa-solid fa-arrow-left"></i></button><h1 id="playlist-view-title" class="text-xl font-bold text-white"></h1></div>
        <div id="playlist-view-songs" class="space-y-3 px-1"></div>
    </main>

    <!-- المشغل -->
    <div id="now-playing-screen" class="fixed inset-0 bg-[#0c0c0c] z-50 transform translate-y-full transition-transform duration-300 flex flex-col justify-between p-6 pb-10">
        <div class="flex justify-between items-center text-xs font-bold tracking-widest text-zinc-400">
            <button onclick="minimizePlayer()" class="text-white text-lg"><i class="fa-solid fa-chevron-down"></i></button>
            <span>NOW PLAYING</span>
            <button onclick="toggleFavoriteCurrent()" class="text-lg"><i id="np-fav-icon" class="fa-regular fa-heart"></i></button>
        </div>
        <div class="flex-1 flex items-center justify-center my-4"><img id="np-img" src="" class="w-full aspect-square object-cover rounded-2xl shadow-2xl max-w-[280px]"></div>
        <div class="space-y-5">
            <div><h2 id="np-title" class="text-xl font-bold text-white truncate"></h2><p id="np-artist" class="text-zinc-500 text-xs mt-0.5 truncate"></p></div>
            <div class="space-y-1"><input type="range" id="progress-bar" min="0" max="100" value="0" class="w-full accent-red-600 bg-zinc-800 h-1 rounded-lg cursor-pointer"><div class="flex justify-between text-[10px] text-zinc-500"><span id="current-time">0:00</span><span id="total-duration">0:00</span></div></div>
            <div class="flex justify-center items-center space-x-8">
                <button onclick="playPrev()" class="text-white text-xl"><i class="fa-solid fa-backward-step"></i></button>
                <button onclick="togglePlay()" class="ymusic-red text-white rounded-full w-14 h-14 flex items-center justify-center text-xl"><i id="np-play-icon" class="fa-solid fa-play"></i></button>
                <button onclick="playNext()" class="text-white text-xl"><i class="fa-solid fa-forward-step"></i></button>
            </div>
        </div>
    </div>

    <!-- شريط تنقل -->
    <nav class="fixed bottom-0 left-0 right-0 bg-[#0c0c0c] border-t border-zinc-900 h-14 flex justify-around items-center z-40">
        <button onclick="switchScreen('search')" class="text-ymusic-red flex flex-col items-center"><i class="fa-solid fa-magnifying-glass text-lg"></i><span class="text-[9px]">Search</span></button>
        <button onclick="switchScreen('favorites')" class="text-zinc-500 flex flex-col items-center"><i class="fa-solid fa-heart text-lg"></i><span class="text-[9px]">Favorites</span></button>
        <button onclick="switchScreen('playlists')" class="text-zinc-500 flex flex-col items-center"><i class="fa-solid fa-list-ul text-lg"></i><span class="text-[9px]">Playlists</span></button>
    </nav>

    <script>
        let currentQueue = []; let currentTrackIndex = -1; let audioPlayer = new Audio();
        const SC_CLIENT_ID = "j3hxYRI1o14nGN1q5GlF5A26f1X55V43";
        let favorites = JSON.parse(localStorage.getItem('ymusic_favs') || '[]');
        let playlists = JSON.parse(localStorage.getItem('ymusic_lists') || '{}');

        async function performSearch(event) {
            if(event) event.preventDefault();
            const query = document.getElementById('search-input').value.trim();
            if(!query) return;
            const container = document.getElementById('trending-list');
            container.innerHTML = `<p class="text-zinc-500 text-sm text-center py-10"><i class="fa-solid fa-spinner animate-spin"></i> جاري البحث...</p>`;
            
            // استخدام Proxy لتجاوز CORS
            const targetUrl = `https://api-v2.soundcloud.com/search/tracks?q=${encodeURIComponent(query)}&client_id=${SC_CLIENT_ID}&limit=20`;
            try {
                const response = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(targetUrl)}`);
                const json = await response.json();
                const data = JSON.parse(json.contents);
                if (data.collection?.length > 0) {
                    currentQueue = data.collection.map(item => ({
                        id: item.id, title: item.title, artist: item.user.username,
                        img: item.artwork_url?.replace('-large', '-t500x500') || 'https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?w=500',
                        streamUrl: `${item.stream_url}?client_id=${SC_CLIENT_ID}`
                    }));
                    renderTrending(currentQueue);
                } else container.innerHTML = `<p class="text-zinc-500 text-sm text-center py-10">لا توجد نتائج.</p>`;
            } catch (e) { container.innerHTML = `<p class="text-red-500 text-sm text-center py-10">حدث خطأ في الاتصال.</p>`; }
        }

        function renderTrending(songs) {
            const container = document.getElementById('trending-list'); container.innerHTML = '';
            songs.forEach((song, idx) => {
                const div = document.createElement('div');
                div.className = "flex items-center justify-between bg-[#111] p-2.5 rounded-xl";
                div.onclick = () => { currentQueue = songs; currentTrackIndex = idx; playSong(song); };
                div.innerHTML = `<div class="flex items-center space-x-3"><img src="${song.img}" class="w-12 h-12 rounded-xl"><div><h4 class="text-white text-xs truncate">${song.title}</h4></div></div>`;
                container.appendChild(div);
            });
        }

        function playSong(song) {
            audioPlayer.src = song.streamUrl;
            audioPlayer.play();
            document.getElementById('np-title').innerText = song.title;
            document.getElementById('np-img').src = song.img;
            document.getElementById('now-playing-screen').classList.remove('translate-y-full');
        }

        function togglePlay() { audioPlayer.paused ? audioPlayer.play() : audioPlayer.pause(); }
        function switchScreen(s) { ['search','favorites','playlists','playlist-view'].forEach(id => document.getElementById(`screen-${id}`).classList.add('hidden')); document.getElementById(`screen-${s}`).classList.remove('hidden'); }
        function minimizePlayer() { document.getElementById('now-playing-screen').classList.add('translate-y-full'); }
    </script>
</body>
</html>
