workflows:
  flutter-android:
    name: Flutter Android APK
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      flutter: stable
    scripts:
      - name: Get Flutter packages
        script: |
          flutter pub get
      - name: Build Flutter APK
        script: |
          flutter build apk --debug
    artifacts:
      - build/app/outputs/flutter-apk/**/*.apk
