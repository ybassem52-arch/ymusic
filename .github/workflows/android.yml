name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install pnpm
      uses: pnpm/action-setup@v3
      with:
        version: 8

    - name: Install Dependencies
      run: pnpm install --no-frozen-lockfile

    - name: Build Web Project (Skip Strict TS)
      run: npx vite build --emptyOutDir || pnpm run build --if-present
      env:
        TSC_COMPILE_ON_ERROR: "true"

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'zulu'

    - name: Set up Android SDK
      uses: android-actions/setup-android@v3

    - name: Install Capacitor & Build APK
      run: |
        pnpm add @capacitor/core @capacitor/cli @capacitor/android
        npx cap init ymusic app.ymusic.com --web-dir=dist || npx cap init ymusic app.ymusic.com --web-dir=build
        npx cap add android
        npx cap sync
        cd android && ./gradlew assembleRelease

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ymusic-apk
        path: android/app/build/outputs/apk/release/app-release-unsigned.apk
