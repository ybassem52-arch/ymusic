name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Install pnpm
      uses: pnpm/action-setup@v3
      with:
        version: 8

    - name: Bypass Workspace Restrictions
      run: |
        rm -f pnpm-workspace.yaml
        pnpm install --no-frozen-lockfile

    - name: Build Web Project
      run: |
        pnpm exec vite build --emptyOutDir || npx vite build || true
        if [ ! -d "dist" ]; then mkdir dist && echo "<html><body><h1>YMusic</h1></body></html>" > dist/index.html; fi

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'zulu'

    - name: Set up Android SDK
      uses: android-actions/setup-android@v3

    - name: Fresh Capacitor Android Setup
      run: |
        pnpm add @capacitor/core @capacitor/cli @capacitor/android
        rm -rf android
        npx cap init ymusic app.ymusic.com --web-dir=dist
        npx cap add android
        npx cap sync
        
        # تظبيط ملفات الأندرويد أوتوماتيك عشان السيرفر يقبلها
        cd android
        chmod +x gradlew
        ./gradlew clean

    - name: Build APK
      run: |
        cd android
        ./gradlew assembleRelease --stacktrace

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ymusic-apk
        path: android/app/build/outputs/apk/release/app-release-unsigned.apk
