name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Check Directory Contents
      # الخطوة دي هتطبع لنا في الـ Logs السيرفر شايف ملفات إيه بالظبط عشان نعرف المشروع فين
      run: |
        echo "=== الأستاذ سيرفر شايف الملفات دي بره ==="
        ls -la
        echo "========================================="

    - name: Set up Java JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'zulu'

    - name: Set up Flutter Environment
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.19.x'
        channel: 'stable'

    - name: Build Flutter APK (Try Main and Subdirectories)
      run: |
        # هنجرب نبني بره، ولو منفعش هندور على الملف ونبني مكانه أوتوماتيك
        if [ -f "pubspec.yaml" ]; then
          flutter pub get
          flutter build apk --debug
        else
          # لو الملف مستخبي جوه أي مجلد فرعي، السيرفر هيدخل ويبنيه غصب عنه
          TARGET_DIR=$(find . -name "pubspec.yaml" -exec dirname {} \;)
          if [ ! -z "$TARGET_DIR" ]; then
            echo "لقيت المشروع جوه مجلد: $TARGET_DIR"
            cd "$TARGET_DIR"
            flutter pub get
            flutter build apk --debug
            # نقل الـ APK للمكان المتوقع رفعه منه
            mkdir -p $GITHUB_WORKSPACE/build/app/outputs/flutter-apk/
            cp build/app/outputs/flutter-apk/app-debug.apk $GITHUB_WORKSPACE/build/app/outputs/flutter-apk/app-debug.apk
          else
            echo "الملف مش موجود في أي حتة!"
            exit 1
          fi
        fi

    - name: Upload Finished APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ymusic-app
        path: build/app/outputs/flutter-apk/app-debug.apk
