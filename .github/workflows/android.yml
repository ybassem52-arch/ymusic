name: Build Android Native APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Java JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'zulu'

    - name: Find and Build Android Project Automatically
      run: |
        # البحث عن مكان ملف gradlew في المشروع كله
        GRADLE_DIR=$(find . -name "gradlew" -exec dirname {} \;)
        
        if [ ! -z "$GRADLE_DIR" ]; then
          echo "لقيت ملف الجرادل جوه مجلد: $GRADLE_DIR"
          cd "$GRADLE_DIR"
          
          # إعطاء الصلاحيات وبناء الـ APK في مكانه الصح
          chmod +x gradlew
          ./gradlew assembleDebug
          
          # نسخ الـ APK للمجلد الرئيسي عشان الـ Upload يشوفه
          mkdir -p $GITHUB_WORKSPACE/output-apk/
          cp app/build/outputs/apk/debug/app-debug.apk $GITHUB_WORKSPACE/output-apk/app-debug.apk || cp build/outputs/apk/debug/app-debug.apk $GITHUB_WORKSPACE/output-apk/app-debug.apk
        else
          echo "ملف gradlew مش موجود خالص في الريبو دي!"
          exit 1
        fi

    - name: Upload Finished APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ymusic-native-apk
        path: output-apk/app-debug.apk
